<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="content-language" content="pt-br">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Pessoal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Controle Financeiro Pessoal</h1>

        <form class="card" id="form-transacao">

            <select id="categoria">
                <option value="Receita (Geral)">💰 Receita / Salário</option>
                <option value="Assinaturas">Assinaturas</option>
                <option value="Carro">Carro</option>
                <option value="Casa">Casa</option>
                <option value="Combustível">Combustível</option>
                <option value="Delivery">Delivery</option>
                <option value="Educação">Educação</option>
                <option value="Farmácia">Farmácia</option>
                <option value="Lazer">Lazer</option>
                <option value="Lojas">Lojas</option>
                <option value="Loterias">Loterias</option>
                <option value="Mercado">Mercado</option>
                <option value="Pets">Pets</option>
                <option value="Restaurantes">Restaurantes</option>
                <option value="Saúde">Saúde</option>
                <option value="Transporte por App">Transporte por App</option>
                <option value="Transporte Público">Transporte Público</option>
                <option value="Viagens">Viagens</option>
            </select>

            <input type="date" id="data">

            <input type="text" id="descricao" placeholder="Descrição">

            <input type="text" id="valor" placeholder="Ex: 600,50">

            <button id="adicionar">Adicionar</button>

            <p id="mensagem"></p>

        </form>

        <div class="card">
            <h2>Saldo Atual</h2>
            <p id="saldo">R$ 0,00</p>
        </div>

        <div class="card">
            <h2>Movimentações</h2>
            <ul id="lista-transacoes"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
