<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="alternar-tema" class="btn-theme">🌓 Alternar Tema</button>

    <div class="container">

        <h1>Controle Financeiro</h1>

        <form class="card" id="form-transacao">
            <select id="categoria">
                <option value="Salário">Salário</option>
                <option value="Freelance">Freelance</option>
                <option value="Investimentos">Rendimentos</option>
                <option value="Outras Entradas">Outras Entradas</option>
                <option value="Assinaturas">Assinaturas</option>
                <option value="Carro">Carro</option>
                <option value="Casa">Casa</option>
                <option value="Combustível">Combustível</option>
                <option value="Delivery">Delivery</option>
                <option value="Educação">Educação</option>
                <option value="Farmácia">Farmácia</option>
                <option value="Lazer">Lazer</option>
                <option value="Lojas">Lojas</option>
                <option value="Loterias">Loterias</option>
                <option value="Mercado">Mercado</option>
                <option value="Pets">Pets</option>
                <option value="Restaurantes">Restaurantes</option>
                <option value="Saúde">Saúde</option>
                <option value="Transporte por App">Transporte por App</option>
                <option value="Transporte Público">Transporte Público</option>
                <option value="Viagens">Viagens</option>
            </select>

            <input type="date" id="data" required>
            <input type="text" id="descricao" placeholder="Descrição (Ex: Uber, Atacadão...)">
            <input type="text" id="valor" placeholder="Ex: 600,50" required>

            <button type="submit" id="btn-adicionar">Adicionar transação</button>
            <p id="mensagem"></p>
        </form>

        <div class="card card-saldo">
            <h2>Saldo Atual</h2>
            <p id="saldo">R$ 0,00</p>
            
            <div class="filtro-mes-container">
                <label for="ver-saldo-mes">Visualizando:</label>
                <select id="ver-saldo-mes" class="select-filtro-clean">
                    <option value="Janeiro">Janeiro</option>
                    <option value="Fevereiro">Fevereiro</option>
                    <option value="Março">Março</option>
                    <option value="Abril">Abril</option>
                    <option value="Maio">Maio</option>
                    <option value="Junho">Junho</option>
                    <option value="Julho">Julho</option>
                    <option value="Agosto">Agosto</option>
                    <option value="Setembro">Setembro</option>
                    <option value="Outubro">Outubro</option>
                    <option value="Novembro">Novembro</option>
                    <option value="Dezembro">Dezembro</option>
                </select>
            </div>
        </div>

        <div class="trello-board">
            <div class="trello-column" data-mes="Janeiro"><h3>Janeiro</h3><ul id="lista-janeiro" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Fevereiro"><h3>Fevereiro</h3><ul id="lista-fevereiro" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Março"><h3>Março</h3><ul id="lista-março" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Abril"><h3>Abril</h3><ul id="lista-abril" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Maio"><h3>Maio</h3><ul id="lista-maio" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Junho"><h3>Junho</h3><ul id="lista-junho" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Julho"><h3>Julho</h3><ul id="lista-julho" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Agosto"><h3>Agosto</h3><ul id="lista-agosto" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Setembro"><h3>Setembro</h3><ul id="lista-setembro" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Outubro"><h3>Outubro</h3><ul id="lista-outubro" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Novembro"><h3>Novembro</h3><ul id="lista-novembro" class="trello-list"></ul></div>
            <div class="trello-column" data-mes="Dezembro"><h3>Dezembro</h3><ul id="lista-dezembro" class="trello-list"></ul></div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
