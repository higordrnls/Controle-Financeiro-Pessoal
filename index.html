<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="alternar-tema" class="btn-theme">🌓 Alternar Tema</button>

    <div class="container">

        <h1>Controle Financeiro</h1>

        <form class="card" id="form-transacao">
            <select id="categoria">
                <option value="Salário">Salário</option>
                <option value="Freelance">Freelance</option>
                <option value="Investimentos">Rendimentos</option>
                <option value="Outras Entradas">Outras Entradas</option>
                <option value="Assinaturas">Assinaturas</option>
                <option value="Carro">Carro</option>
                <option value="Casa">Casa</option>
                <option value="Combustível">Combustível</option>
                <option value="Delivery">Delivery</option>
                <option value="Educação">Educação</option>
                <option value="Farmácia">Farmácia</option>
                <option value="Lazer">Lazer</option>
                <option value="Lojas">Lojas</option>
                <option value="Loterias">Loterias</option>
                <option value="Mercado">Mercado</option>
                <option value="Pets">Pets</option>
                <option value="Restaurantes">Restaurantes</option>
                <option value="Saúde">Saúde</option>
                <option value="Transporte por App">Transporte por App</option>
                <option value="Transporte Público">Transporte Público</option>
                <option value="Viagens">Viagens</option>
            </select>

            <input type="date" id="data" required>
            <input type="text" id="descricao" placeholder="Descrição (Ex: Uber, Atacadão...)">
            <input type="text" id="valor" placeholder="Ex: 600,50" required>

            <button type="submit" id="btn-adicionar">Adicionar transação</button>
            <p id="mensagem"></p>
        </form>

        <div class="card card-saldo">
            <h2>Saldo Atual</h2>
            <p id="saldo">R$ 0,00</p>
            
            <div class="filtro-mes-container">
               <label for="ver-saldo-periodo">Visualizando:</label>

<select
    id="ver-saldo-periodo"
    class="select-filtro-clean">
</select>
            </div>
        </div>

        <div id="board" class="trello-board"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
